name: Setup Python project
description: Set up Python and install project dependencies

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.12"
  extra-packages:
    description: Additional pip packages to install after project requirements
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: requirements.txt

    - name: Install Python dependencies
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: Install extra Python dependencies
      if: ${{ inputs.extra-packages != '' }}
      shell: bash
      env:
        EXTRA_PACKAGES: ${{ inputs.extra-packages }}
      run: |
        set -euo pipefail
        python -m pip install $EXTRA_PACKAGES
