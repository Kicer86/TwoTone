
name: unittests

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        lfs: true

    - name: Set up Python environment
      uses: ./.github/actions/setup-python-project
      with:
        python-version: '3.12'

    - name: Install required tools (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update && \
        sudo apt-get install -y \
          exiftool \
          ffmpeg \
          mkvtoolnix

    - name: Install required tools (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update && \
        brew install exiftool ffmpeg mkvtoolnix

    - name: Install required tools (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install -y exiftool ffmpeg mkvtoolnix.portable

    - name: Run unit tests
      run: |
        python -m unittest discover tests
