
name: unittests

on:
  push:
    branches:
      - master
    paths:
      - 'twotone/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/unittests.yml'
      - '.github/actions/**'
  pull_request:
    paths:
      - 'twotone/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/unittests.yml'
      - '.github/actions/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  tests:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            python-version: '3.10'
          - os: ubuntu-24.04
            python-version: '3.12'
          - os: ubuntu-26.04
            python-version: '3.14'
          - os: macos-15-intel
            python-version: '3.11'
          - os: macos-15
            python-version: '3.13'
          - os: macos-26
            python-version: '3.14'
          - os: windows-2022
            python-version: '3.10'
          - os: windows-2025
            python-version: '3.14'

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        lfs: true

    - name: Set up Python environment
      uses: ./.github/actions/setup-python-project
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install required tools (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update && \
        sudo apt-get install -y \
          exiftool \
          ffmpeg \
          mkvtoolnix

    - name: Install required tools (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update && \
        brew install exiftool ffmpeg mkvtoolnix

    - name: Install required tools (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install -y exiftool ffmpeg mkvtoolnix.portable

    - name: Run unit tests
      run: |
        python -m unittest discover tests
