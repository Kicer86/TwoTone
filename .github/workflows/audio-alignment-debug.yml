name: audio-alignment-debug

on:
  push:
    branches-ignore:
      - master
    paths:
      - 'twotone/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/audio-alignment-debug.yml'
      - '.github/actions/**'
  workflow_dispatch:
    inputs:
      lhs:
        description: Left audio-alignment variant
        required: true
        default: v00_asR_vsR_aeR_veR
      rhs:
        description: Right audio-alignment variant
        required: true
        default: v01_asR_vsR_aeR_veT

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-26.04, macos-latest]

    env:
      AUDIO_DEBUG_LHS: ${{ github.event.inputs.lhs || 'v00_asR_vsR_aeR_veR' }}
      AUDIO_DEBUG_RHS: ${{ github.event.inputs.rhs || 'v01_asR_vsR_aeR_veT' }}
      AUDIO_DEBUG_DIR: audio-alignment-debug

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-project
        with:
          python-version: '3.12'

      - name: Install required tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            mkvtoolnix

      - name: Install required tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ffmpeg mkvtoolnix

      - name: Probe AAC priming (build-dependent)
        run: |
          python tests/melt/probe_priming.py

      - name: Run audio alignment diagnostic
        run: |
          python tests/melt/debug_audio_alignment.py run \
            --lhs "${AUDIO_DEBUG_LHS}" \
            --rhs "${AUDIO_DEBUG_RHS}" \
            --output-dir "${AUDIO_DEBUG_DIR}" \
            --overwrite

      - name: Upload diagnostic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audio-alignment-debug-${{ matrix.os }}-${{ github.run_id }}
          path: audio-alignment-debug/
          if-no-files-found: error
          retention-days: 14
